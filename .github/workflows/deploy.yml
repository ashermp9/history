name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: __quartz

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        run: cd __quartz && npm ci

      - name: Copy vault content into Quartz
        run: |
          rm -rf __quartz/content
          mkdir __quartz/content
          # Copy all vault folders and markdown files, skip hidden dirs and quartz itself
          for item in Персоны События Места Периоды Войны Государства lectures *.md; do
            if [ -e "$item" ]; then
              cp -r "$item" __quartz/content/
            fi
          done

      - name: Configure Quartz
        run: |
          cat > __quartz/quartz.config.ts << 'QUARTZ_CONFIG'
          import { QuartzConfig } from "./quartz/cfg"
          import * as Plugin from "./quartz/plugins"

          const config: QuartzConfig = {
            configuration: {
              pageTitle: "📜 История",
              pageTitleSuffix: "",
              enableSPA: true,
              enablePopovers: true,
              analytics: null,
              locale: "ru-RU",
              baseUrl: "ashermp9.github.io/history",
              ignorePatterns: ["private", "templates", ".obsidian"],
              defaultDateType: "modified",
              theme: {
                fontOrigin: "googleFonts",
                cdnCaching: true,
                typography: {
                  header: "Noto Serif",
                  body: "Noto Sans",
                  code: "JetBrains Mono",
                },
                colors: {
                  lightMode: {
                    light: "#faf8f8",
                    lightgray: "#e5e5e5",
                    gray: "#b8b8b8",
                    darkgray: "#4e4e4e",
                    dark: "#2b2b2b",
                    secondary: "#7b4b2a",
                    tertiary: "#c0885c",
                    highlight: "rgba(123, 75, 42, 0.12)",
                    textHighlight: "#fff23688",
                  },
                  darkMode: {
                    light: "#1e1e1e",
                    lightgray: "#393639",
                    gray: "#646464",
                    darkgray: "#d4d4d4",
                    dark: "#ebebec",
                    secondary: "#d4a373",
                    tertiary: "#c0885c",
                    highlight: "rgba(212, 163, 115, 0.12)",
                    textHighlight: "#fff23644",
                  },
                },
              },
            },
            plugins: {
              transformers: [
                Plugin.FrontMatter(),
                Plugin.CreatedModifiedDate({
                  priority: ["frontmatter", "git", "filesystem"],
                }),
                Plugin.SyntaxHighlighting(),
                Plugin.ObsidianFlavoredMarkdown({ enableInHtmlEmbed: false }),
                Plugin.GitHubFlavoredMarkdown(),
                Plugin.TableOfContents(),
                Plugin.CrawlLinks({ markdownLinkResolution: "shortest" }),
                Plugin.Description(),
                Plugin.Latex({ renderEngine: "katex" }),
              ],
              filters: [Plugin.RemoveDrafts()],
              emitters: [
                Plugin.AliasRedirects(),
                Plugin.ComponentResources(),
                Plugin.ContentPage(),
                Plugin.FolderPage(),
                Plugin.TagPage(),
                Plugin.ContentIndex({
                  enableSiteMap: true,
                  enableRSS: true,
                }),
                Plugin.Assets(),
                Plugin.Static(),
                Plugin.NotFoundPage(),
              ],
            },
          }

          export default config
          QUARTZ_CONFIG

      - name: Create index page
        run: |
          cat > __quartz/content/index.md << 'EOF'
          ---
          title: "📜 История"
          ---

          База знаний по истории.

          ## Разделы

          - 👤 **[[Персоны]]** — исторические личности
          - ⚔️ **[[Войны]]** — войны и конфликты
          - 📅 **[[События]]** — ключевые события
          - 🏛️ **[[Государства]]** — страны и империи
          - 🗺️ **[[Места]]** — города и достопримечательности
          - 📆 **[[Периоды]]** — исторические эпохи
          - 📝 **[[Лекции]]** — конспекты лекций
          EOF

      - name: Build Quartz
        run: cd __quartz && npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: __quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4